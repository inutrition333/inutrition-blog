<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>愛營養部落格 — 後台管理</title>
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'inutrition333/inutrition-blog',
            branch: 'main',
            base_url: 'https://inutrition-blog.vercel.app',
            auth_endpoint: '/api/auth'
          },
          media_folder: 'public/images/uploads',
          public_folder: '/images/uploads',
          locale: 'zh_Hant',
          collections: [{
            name: 'posts',
            label: '部落格文章',
            folder: 'src/content/posts',
            create: true,
            slug: '{{slug}}',
            preview_path: 'posts/{{slug}}',
            extension: 'md',
            format: 'frontmatter',
            fields: [
              { label: '文章標題', name: 'title', widget: 'string', hint: '例如：苦瓜胜肽跟山苦瓜粉差在哪裡？' },
              {
                label: '分類', name: 'category', widget: 'select',
                options: ['腸胃保健','日常代謝','美容養顏','睡眠放鬆','樂齡保養']
              },
              { label: '發布日期', name: 'publishDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD' },
              { label: '閱讀時間（分鐘）', name: 'readTime', widget: 'number', default: 5, value_type: 'int', min: 1, max: 30 },
              { label: '主圖路徑（選填）', name: 'heroImage', widget: 'string', required: false, hint: '先到 /write 頁面上傳圖片，再把路徑貼過來，例如：/images/uploads/xxx.jpg' },
              { label: '文章摘要', name: 'excerpt', widget: 'text', hint: '首頁列表顯示的 1-2 句話' },
              { label: '活動識別碼', name: 'campaign', widget: 'string', required: false, hint: '例如：苦瓜胜肽_202604' },
              { label: '精選文章？', name: 'featured', widget: 'boolean', default: false },
              { label: '文章內文', name: 'body', widget: 'markdown' }
            ]
          }]
        }
      });
    </script>
  </body>
</html>
